name: Sync MrKraken language pack

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: sync-mrkraken-language-pack
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out toolkit repository
        uses: actions/checkout@v4

      - name: Download and validate latest MrKraken release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data

          release_json="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            repos/MrKraken/StarStrings/releases/latest)"

          asset_api_url="$(jq -r '
            [
              .assets[]
              | select(.state == "uploaded")
              | select(((.name // "") | ascii_downcase | endswith(".zip")) or (((.content_type // "") | ascii_downcase | contains("zip"))))
            ][0].url // empty
          ' <<<"$release_json")"

          if [[ -z "$asset_api_url" ]]; then
            echo 'No uploaded ZIP asset was found in the latest MrKraken release.' >&2
            exit 1
          fi

          asset_name="$(jq -r --arg url "$asset_api_url" '.assets[] | select(.url == $url) | .name' <<<"$release_json")"
          curl --fail --location --retry 4 --retry-delay 3 \
            -H 'Accept: application/octet-stream' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$asset_api_url" \
            --output /tmp/mrkraken-release.zip

          zip_entry="$(unzip -Z1 /tmp/mrkraken-release.zip | awk '
            BEGIN { IGNORECASE=1 }
            /(^|\/)data\/localization\/english\/global\.ini$/ { print; exit }
          ')"

          if [[ -z "$zip_entry" ]]; then
            echo 'The release ZIP does not contain Data/Localization/english/global.ini.' >&2
            unzip -Z1 /tmp/mrkraken-release.zip | sed -n '1,120p' >&2
            exit 1
          fi

          unzip -p /tmp/mrkraken-release.zip "$zip_entry" > data/mrkraken-global.ini

          RELEASE_JSON="$release_json" ASSET_NAME="$asset_name" python3 - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          ini_path = Path('data/mrkraken-global.ini')
          raw = ini_path.read_bytes()
          text = raw.decode('utf-8-sig', errors='replace')
          lines = re.split(r'\r\n|\n|\r|\u2028|\u2029', text)
          entries = 0
          for raw_line in lines:
              line = raw_line.rstrip()
              idx = line.find('=')
              if idx <= 0:
                  continue
              key = line[:idx].strip()
              if not key or key.startswith(';') or key.startswith('#'):
                  continue
              entries += 1

          if entries < 10_000:
              raise SystemExit(f'MrKraken global.ini parsed only {entries:,} entries; refusing to publish an incomplete mirror.')

          release = json.loads(os.environ['RELEASE_JSON'])
          metadata = {
              'source_repository': 'MrKraken/StarStrings',
              'release_name': release.get('name') or release.get('tag_name') or 'latest',
              'tag_name': release.get('tag_name') or '',
              'published_at': release.get('published_at') or '',
              'html_url': release.get('html_url') or '',
              'asset_name': os.environ.get('ASSET_NAME', ''),
              'entry_count': entries,
              'byte_count': len(raw),
              'synced_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          Path('data/mrkraken-release.json').write_text(
              json.dumps(metadata, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )
          print(f'Validated {entries:,} entries from {metadata["release_name"]} ({metadata["asset_name"]}).')
          PY

      - name: Commit mirror when it changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/mrkraken-global.ini data/mrkraken-release.json
          if git diff --cached --quiet; then
            echo 'MrKraken mirror is already current.'
            exit 0
          fi
          tag_name="$(jq -r '.tag_name // "latest"' data/mrkraken-release.json)"
          git commit -m "Update MrKraken language pack mirror (${tag_name})"
          git push
