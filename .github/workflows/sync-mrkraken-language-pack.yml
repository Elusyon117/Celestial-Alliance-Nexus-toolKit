name: Sync MrKraken language pack

on:
  workflow_dispatch:
  schedule:
    - cron: '43 7 * * 1'

permissions:
  contents: write

concurrency:
  group: sync-mrkraken-language-pack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download latest StarStrings LIVE release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/mrkraken"
          curl --fail --location --retry 4 --retry-all-errors \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/MrKraken/StarStrings/releases/latest' \
            -o "$RUNNER_TEMP/mrkraken/release.json"
          ASSET_URL="$(jq -r '[.assets[] | select(.name == "StarStrings-LIVE.zip")][0].browser_download_url // [.assets[] | select(.name | test("LIVE.*\\.zip$";"i"))][0].browser_download_url // empty' "$RUNNER_TEMP/mrkraken/release.json")"
          ASSET_NAME="$(jq -r '[.assets[] | select(.name == "StarStrings-LIVE.zip")][0].name // [.assets[] | select(.name | test("LIVE.*\\.zip$";"i"))][0].name // empty' "$RUNNER_TEMP/mrkraken/release.json")"
          test -n "$ASSET_URL" || { echo 'No LIVE ZIP asset found in latest MrKraken release.' >&2; exit 1; }
          curl --fail --location --retry 4 --retry-all-errors "$ASSET_URL" -o "$RUNNER_TEMP/mrkraken/$ASSET_NAME"
          unzip -q -o "$RUNNER_TEMP/mrkraken/$ASSET_NAME" -d "$RUNNER_TEMP/mrkraken/extracted"
          INI_PATH="$(find "$RUNNER_TEMP/mrkraken/extracted" -type f -ipath '*/Data/Localization/english/global.ini' -print -quit)"
          test -s "$INI_PATH" || { echo 'Data/Localization/english/global.ini not found.' >&2; exit 1; }
          ENTRY_COUNT="$(grep -c '=' "$INI_PATH" || true)"
          test "$ENTRY_COUNT" -ge 10000 || { echo "Mirror is incomplete: $ENTRY_COUNT entries." >&2; exit 1; }
          cp "$INI_PATH" data/mrkraken-global.ini
          export ENTRY_COUNT ASSET_NAME
          python3 - <<'PY'
          import json, os, pathlib, datetime
          release=json.loads(pathlib.Path(os.environ['RUNNER_TEMP'],'mrkraken','release.json').read_text())
          target=pathlib.Path('data/mrkraken-global.ini')
          meta={
            'source_repository':'MrKraken/StarStrings',
            'release_name':release.get('name') or release.get('tag_name') or '',
            'tag_name':release.get('tag_name') or '',
            'published_at':release.get('published_at') or '',
            'html_url':release.get('html_url') or '',
            'asset_name':os.environ['ASSET_NAME'],
            'entry_count':int(os.environ['ENTRY_COUNT']),
            'byte_count':target.stat().st_size,
            'synced_at':datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00','Z')
          }
          pathlib.Path('data/mrkraken-release.json').write_text(json.dumps(meta,indent=2)+'\n')
          PY
      - name: Commit language mirror
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mrkraken-global.ini data/mrkraken-release.json
          if git diff --cached --quiet; then echo 'No language-pack changes.'; exit 0; fi
          git commit -m "Sync MrKraken language pack"
          for attempt in 1 2 3; do
            git pull --rebase origin "$GITHUB_REF_NAME"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
