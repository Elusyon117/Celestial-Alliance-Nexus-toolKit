name: Sync game data

on:
  workflow_dispatch:
    inputs:
      patch:
        description: Optional patch override, such as 4.9.0. Leave blank for newest LIVE.
        required: false
        default: ''
        type: string
      channel:
        description: Game channel
        required: true
        default: LIVE
        type: choice
        options: [LIVE, PTU, EPTU]
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: sync-game-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MISSION_PATCH: ${{ github.event.inputs.patch || '' }}
      MISSION_CHANNEL: ${{ github.event.inputs.channel || 'LIVE' }}
      MIN_MISSION_COUNT: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Validate scripts
        run: |
          node --check scripts/sync-scmdb-missions.mjs
          node --check scripts/audit-patch-data.mjs
      - name: Synchronize mission catalog
        run: node scripts/sync-scmdb-missions.mjs
      - name: Audit generated data
        run: node scripts/audit-patch-data.mjs
      - name: Commit generated files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scmdb-missions-live.json data/scmdb-missions-live.js data/game-data-status.json data/patch-audit.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Sync latest game data"
          for attempt in 1 2 3; do
            git pull --rebase origin "$GITHUB_REF_NAME"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
      - name: Add summary
        if: always()
        run: |
          echo "## Game-data synchronization" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/game-data-status.json ]; then
            jq -r '.modules.contractFinder | "- Status: `\(.status)`\n- Patch: `\(.patch)`\n- Channel: `\(.channel)`\n- Missions: `\(.totalCount)`\n- Last error: `\(.lastError // "")`"' data/game-data-status.json >> "$GITHUB_STEP_SUMMARY"
          fi
