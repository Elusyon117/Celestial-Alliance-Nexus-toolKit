name: Restore or sync SCMDB 4.9 contracts

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: restore-or-sync-scmdb-4-9-${{ github.ref }}
  cancel-in-progress: false

env:
  MISSION_PATCH: '4.9.0'
  MISSION_CHANNEL: 'LIVE'
  MIN_MISSION_COUNT: '100'

jobs:
  restore-or-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out complete repository history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Validate SCMDB scripts
        run: |
          node --check scripts/recover-scmdb-from-history.mjs
          node --check scripts/sync-scmdb-missions.mjs
          node --check scripts/audit-patch-data.mjs

      - name: Check current tracked snapshot
        id: current
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          let valid = false;
          let missionCount = 0;
          let status = 'missing';
          try {
            const payload = JSON.parse(fs.readFileSync('data/scmdb-missions-live.json', 'utf8'));
            const state = JSON.parse(fs.readFileSync('data/game-data-status.json', 'utf8'));
            missionCount = Array.isArray(payload.missions) ? payload.missions.length : 0;
            status = state?.modules?.contractFinder?.status || 'unknown';
            valid = payload.targetPatch === '4.9.0'
              && payload.targetChannel === 'LIVE'
              && payload.patchVerified === true
              && missionCount >= 100;
          } catch (_) {}

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `valid=${valid}\nmission_count=${missionCount}\nstatus=${status}\n`);
          if (valid) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
              `## Existing SCMDB snapshot accepted\n\nThe repository already contains ${missionCount} verified 4.9.0 LIVE missions. No download or release asset is required.\n`);
          }
          NODE

      - name: Recover verified contracts from repository history
        if: ${{ steps.current.outputs.valid != 'true' }}
        id: history
        continue-on-error: true
        run: node scripts/recover-scmdb-from-history.mjs

      - name: Try the direct SCMDB 4.9 LIVE asset
        if: ${{ steps.current.outputs.valid != 'true' && steps.history.outcome != 'success' }}
        id: upstream
        continue-on-error: true
        env:
          STRICT_SYNC: '1'
          SCMDB_MISSIONS_URL: 'https://scmdb.net/data/merged-4.9.0-live.12232306.json'
        run: node scripts/sync-scmdb-missions.mjs

      - name: Verify a usable snapshot now exists
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const payload = JSON.parse(fs.readFileSync('data/scmdb-missions-live.json', 'utf8'));
          const state = JSON.parse(fs.readFileSync('data/game-data-status.json', 'utf8'));
          const module = state?.modules?.contractFinder || {};
          const count = Array.isArray(payload.missions) ? payload.missions.length : 0;

          const valid = payload.targetPatch === '4.9.0'
            && payload.targetChannel === 'LIVE'
            && payload.patchVerified === true
            && count >= 100
            && ['current', 'stale-upstream-unavailable'].includes(module.status);

          if (!valid) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
              `## SCMDB recovery failed\n\nNo verified 4.9.0 LIVE snapshot could be recovered from Git history, and SCMDB did not provide the direct asset. Restore your preserved data/scmdb-missions-live.json, data/scmdb-missions-live.js, and data/game-data-status.json files, then rerun this workflow.\n`);
            throw new Error(`No usable SCMDB snapshot exists. Current status=${module.status || 'unknown'}, missions=${count}.`);
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
            `## SCMDB contracts ready\n\n- Status: \`${module.status}\`\n- Game version: \`${module.gameVersion || payload.gameVersion}\`\n- Missions: \`${count}\`\n- Active: \`${module.activeCount ?? 'unknown'}\`\n`);
          console.log(`Verified ${count} SCMDB mission records.`);
          NODE

      - name: Audit patch-sensitive data
        env:
          STRICT_AUDIT: '1'
        run: node scripts/audit-patch-data.mjs

      - name: Commit recovered or synchronized contracts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            data/scmdb-missions-live.json \
            data/scmdb-missions-live.js \
            data/game-data-status.json \
            data/patch-audit.json

          if git diff --cached --quiet; then
            echo 'The verified SCMDB snapshot is already committed.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m 'Restore verified SCMDB 4.9 LIVE contracts'
          for attempt in 1 2 3; do
            git pull --rebase origin "$GITHUB_REF_NAME"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              exit 0
            fi
            sleep $((attempt * 3))
          done

          echo 'Push failed after three attempts.' >&2
          exit 1
