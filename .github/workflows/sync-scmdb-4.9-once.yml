name: Import SCMDB 4.9 from release asset

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Temporary GitHub release tag containing the SCMDB JSON asset
        required: true
        default: scmdb-4.9-import
        type: string
      asset_name:
        description: Exact asset filename
        required: true
        default: merged-4.9.0-live.12232306.json
        type: string
      cleanup_release:
        description: Delete the temporary release and tag after a successful import
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  MISSION_PATCH: 4.9.0
  MISSION_CHANNEL: LIVE
  MIN_MISSION_COUNT: 100
  STRICT_SYNC: 1
  STRICT_AUDIT: 1

concurrency:
  group: scmdb-4-9-release-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Validate import scripts
        run: |
          node --check scripts/sync-scmdb-missions.mjs
          node --check scripts/audit-patch-data.mjs

      - name: Check for an existing verified 4.9 LIVE snapshot
        id: existing
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          let valid=false, count=0, status='missing';
          try {
            const payload=JSON.parse(fs.readFileSync('data/scmdb-missions-live.json','utf8'));
            const state=JSON.parse(fs.readFileSync('data/game-data-status.json','utf8'));
            count=Array.isArray(payload.missions)?payload.missions.length:0;
            status=state?.modules?.contractFinder?.status||'unknown';
            valid=payload.targetPatch==='4.9.0'&&payload.targetChannel==='LIVE'&&payload.patchVerified===true&&count>=100;
          } catch (_) {}
          fs.appendFileSync(process.env.GITHUB_OUTPUT,`valid=${valid}\nmission_count=${count}\nstatus=${status}\n`);
          if(valid) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,`## Existing SCMDB snapshot accepted\n\nA verified 4.9.0 LIVE snapshot with ${count} missions is already tracked. The release download/import steps will be skipped and the snapshot will only be audited.\n`);
          NODE

      - name: Confirm release asset exists
        if: ${{ steps.existing.outputs.valid != 'true' }}
        id: preflight
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets,tagName > release.json 2> release-error.txt; then
            {
              echo "## SCMDB import preflight failed"
              echo
              echo "Release tag \`$RELEASE_TAG\` does not exist. Create a temporary prerelease with that tag and upload \`$ASSET_NAME\`, then run this workflow again."
              echo
              echo '```text'
              cat release-error.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if ! jq -e --arg name "$ASSET_NAME" '.assets[] | select(.name == $name)' release.json >/dev/null; then
            {
              echo "## SCMDB import preflight failed"
              echo
              echo "The release exists, but it does not contain the exact asset \`$ASSET_NAME\`."
              echo
              echo "Available assets:"
              jq -r '.assets[].name | "- `" + . + "`"' release.json
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Release and exact asset verified." >> "$GITHUB_STEP_SUMMARY"

      - name: Download release asset
        if: ${{ steps.existing.outputs.valid != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/scmdb-import"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET_NAME" \
            --dir "$RUNNER_TEMP/scmdb-import" \
            --clobber
          test -s "$RUNNER_TEMP/scmdb-import/$ASSET_NAME"
          node -e 'JSON.parse(require("fs").readFileSync(process.argv[1],"utf8"));' "$RUNNER_TEMP/scmdb-import/$ASSET_NAME"
          echo "SCMDB_ASSET_PATH=$RUNNER_TEMP/scmdb-import/$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Import and normalize SCMDB mission data
        if: ${{ steps.existing.outputs.valid != 'true' }}
        run: |
          set -euo pipefail
          SCMDB_MISSIONS_URL="$(node --input-type=module -e 'import {pathToFileURL} from "node:url"; console.log(pathToFileURL(process.argv[1]).href)' "$SCMDB_ASSET_PATH")"
          export SCMDB_MISSIONS_URL
          node scripts/sync-scmdb-missions.mjs

      - name: Audit tracked SCMDB snapshot
        run: node scripts/audit-patch-data.mjs

      - name: Verify generated snapshot
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const payload=JSON.parse(fs.readFileSync('data/scmdb-missions-live.json','utf8'));
          const status=JSON.parse(fs.readFileSync('data/game-data-status.json','utf8'));
          const audit=JSON.parse(fs.readFileSync('data/patch-audit.json','utf8'));
          const module=status?.modules?.contractFinder||{};
          if(payload.targetPatch!=='4.9.0'||payload.targetChannel!=='LIVE'||payload.patchVerified!==true) throw new Error('Generated payload identity is not verified 4.9.0 LIVE.');
          if(!Array.isArray(payload.missions)||payload.missions.length<100) throw new Error(`Only ${payload.missions?.length||0} missions were generated.`);
          if(!['current','stale-upstream-unavailable'].includes(module.status)||module.patch!=='4.9.0'||module.channel!=='LIVE') throw new Error('Generated status does not identify a usable 4.9.0 LIVE snapshot.');
          if(audit.status==='failed') throw new Error('Patch audit failed.');
          console.log(`Verified ${payload.missions.length} mission records.`);
          NODE

      - name: Commit imported data
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scmdb-missions-live.json data/scmdb-missions-live.js data/game-data-status.json data/patch-audit.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated-data changes were required." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git commit -m "Import verified SCMDB 4.9 LIVE mission snapshot"
          for attempt in 1 2 3; do
            git pull --rebase origin "$GITHUB_REF_NAME"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "Push failed after three attempts." >&2
          exit 1

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## SCMDB 4.9 import result"
            echo
            echo "- Release tag: \`${{ inputs.release_tag }}\`"
            echo "- Asset: \`${{ inputs.asset_name }}\`"
            if [ -f data/game-data-status.json ]; then
              echo "- Status: \`$(jq -r '.modules.contractFinder.status // "unknown"' data/game-data-status.json)\`"
              echo "- Missions: \`$(jq -r '.modules.contractFinder.totalCount // 0' data/game-data-status.json)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete temporary release after successful import
        if: ${{ success() && inputs.cleanup_release && steps.existing.outputs.valid != 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release delete "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
