name: Sync SCMDB mission data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

concurrency:
  group: scmdb-mission-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Validate synchronization script
        run: node --check scripts/sync-scmdb-missions.mjs

      - name: Synchronize mission catalog
        env:
          MISSION_PATCH: "4.8.3"
          MISSION_CHANNEL: "LIVE"
        run: node scripts/sync-scmdb-missions.mjs

      - name: Commit updated mission snapshot
        shell: bash
        run: |
          set -euo pipefail

          changes="$(git status --porcelain -- \
            data/scmdb-missions-live.json \
            data/scmdb-missions-live.js)"

          if [[ -z "$changes" ]]; then
            echo "Mission snapshot is already current or SCMDB was temporarily unavailable."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scmdb-missions-live.json data/scmdb-missions-live.js
          git commit -m "Update SCMDB 4.8.3 LIVE mission snapshot"

          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
